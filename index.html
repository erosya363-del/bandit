<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="БАНДИТ — вертикальный платформер с Человеком-Пауком" />
    <title>БАНДИТ — Человек-Паук</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="game-container">
        <div class="ui-overlay">
            <div class="ui-panel"><span class="ui-label">СЧЁТ</span><span id="score">0</span></div>
            <div class="ui-panel ui-panel-rank"><span class="ui-label">РЕЙТИНГ</span><span id="liveRank">—</span></div>
            <div class="ui-panel"><span class="ui-label">КОМБО·ПРЫЖ</span><span id="combo">x1 · ⬆2</span></div>
            <div class="ui-panel"><span class="ui-label">ЖИЗНИ</span><span id="lives">♥♥♥</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="mobileControls" class="mobile-controls">
            <div class="mobile-buttons-left">
                <button type="button" class="mobile-btn" id="btnLeft" aria-label="Влево">◀</button>
                <button type="button" class="mobile-btn" id="btnRight" aria-label="Вправo">▶</button>
            </div>
            <div class="mobile-buttons-right">
                <button type="button" class="mobile-btn jump-btn" id="btnJump" aria-label="Прыжок">⇧</button>
            </div>
        </div>

        <div id="startScreen" class="screen">
            <div class="screen-content">
                <div class="hero-badge">🕷️</div>
                <h1 class="game-title">БАНДИТ</h1>
                <p class="game-subtitle">Человек-Паук · Ночной город · Рейтинг</p>

                <div class="name-input-wrap">
                    <input type="text" id="playerName" class="player-name-input" placeholder="Ваше имя" maxlength="20" autocomplete="off" inputmode="text" autocapitalize="none" />
                    <p class="input-error" id="nameError">Введите имя: 2–20 букв или цифр</p>
                </div>

                <div class="difficulty-selector">
                    <button type="button" class="difficulty-btn" data-diff="easy">Легко</button>
                    <button type="button" class="difficulty-btn active" data-diff="medium">Средне</button>
                    <button type="button" class="difficulty-btn" data-diff="hard">Сложно</button>
                </div>

                <div class="avatar-upload">
                    <div class="avatar-preview" id="avatarPreview">
                        <div class="avatar-placeholder">📷</div>
                        <div class="avatar-loader" id="avatarLoader"><div class="loader-spinner"></div><span>Обработка...</span></div>
                    </div>
                    <label for="avatarInput" class="btn-avatar">Загрузить лицо</label>
                    <input type="file" id="avatarInput" accept="image/*" style="display:none" />
                    <button type="button" id="clearAvatar" class="btn-clear-avatar" style="display:none">✕ Убрать</button>
                </div>

                <div id="leaderboard" class="leaderboard" style="display:none">
                    <h3>🏆 Топ‑10</h3>
                    <div id="leaderboardList" class="leaderboard-list"></div>
                </div>

                <p class="controls-text">👆 Водите — ходьба · Тап / ⇧ / Пробел — прыжок (×2)</p>
                <div class="action-buttons">
                    <button type="button" id="startBtn" class="btn-start">НАЧАТЬ ИГРУ</button>
                    <button type="button" id="showLeaderboardBtn" class="btn-leaderboard">🏆 Рекорды</button>
                </div>
            </div>
        </div>

        <div id="gameOverScreen" class="screen hidden">
            <div class="screen-content">
                <h1 class="game-title gameover">GAME OVER</h1>
                <p class="player-name-display">Игрок: <span id="gameOverPlayerName">—</span></p>
                <p class="final-score">Счёт: <span id="finalScore">0</span></p>
                <p class="best-score">Рекорд: <span id="bestScore">0</span></p>
                <p class="rank-display" id="rankDisplay"></p>
                <div id="gameOverLeaderboard" class="leaderboard">
                    <h3>🏆 Топ‑10</h3>
                    <div id="gameOverLeaderboardList" class="leaderboard-list"></div>
                </div>
                <button type="button" id="restartBtn" class="btn-start">ЗАНОВО</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/math.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/input.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/systems.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
